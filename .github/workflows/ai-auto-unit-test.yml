name: AI Auto Unit Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-generate-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - run: pip install pytest pytest-cov openai gitpython

      - name: AI 生成单元测试用例
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          cat > generate_test.py << 'EOF'
          import os
          from openai import OpenAI
          from git import Repo

          # 配置智谱 GLM-4.7-Flash
          client = OpenAI(
              api_key=os.getenv("ZHIPU_API_KEY"),
              base_url="https://open.bigmodel.cn/api/paas/v4/"
          )

          repo = Repo(".")
          os.makedirs("tests", exist_ok=True)

          # 获取本次变更的 Python 文件（排除测试文件）
          try:
              changed_files = [
                  item.a_path for item in repo.head.commit.diff('HEAD~1')
                  if item.a_path.endswith('.py') and not item.a_path.startswith('test_') and not 'tests/' in item.a_path
              ]
          except ValueError:
              # 如果是第一次提交，没有 HEAD~1，就处理所有非测试 Python 文件
              changed_files = [
                  f for f in repo.git.ls_files().split('\n')
                  if f.endswith('.py') and not f.startswith('test_') and not 'tests/' in f
              ]

          for fpath in changed_files:
              if not os.path.exists(fpath):
                  continue
              
              print(f"正在为 {fpath} 生成测试用例...")
              
              # 读取原代码
              with open(fpath, 'r', encoding='utf-8') as f:
                  code = f.read()

              # 构建提示词
              prompt = f"""请为以下 Python 代码生成完整的 pytest 单元测试用例。
              要求：
              1. 覆盖正常场景、边界场景和异常场景
              2. 仅输出完整可运行的测试代码，不要任何额外说明
              3. 测试文件命名规范为 test_原文件名.py
              4. 测试用例要简洁、清晰、有代表性

              原代码如下：
              {code}
              """

              try:
                  # 调用 GLM-4.7-Flash
                  res = client.chat.completions.create(
                      model="glm-4.7-flash",
                      messages=[{"role": "user", "content": prompt}],
                      temperature=0.3
                  )

                  test_code = res.choices[0].message.content
                  
                  # 清理 Markdown 代码块标记
                  test_code = test_code.replace("```python", "").replace("```", "").strip()

                  # 生成测试文件路径
                  file_name = os.path.basename(fpath).replace('.py', '')
                  test_path = f"tests/test_{file_name}.py"

                  # 写回测试文件
                  with open(test_path, 'w', encoding='utf-8') as f:
                      f.write(test_code)
                  
                  print(f"测试用例已生成: {test_path}")

              except Exception as e:
                  print(f"生成失败 {fpath}: {e}")
                  continue
          EOF
          
          python generate_test.py

      - name: 运行单元测试并生成报告
        run: |
          pytest tests/ --cov=./ -v > test_report.txt 2>&1 || true
          cat test_report.txt

      - name: 将测试结果发布到 PR 评论
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('test_report.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### AI 自动生成单元测试结果\n\n\`\`\`\n${report}\n\`\`\``
            });

      - name: 自动提交测试文件
        if: github.event_name == 'push'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/
          git commit -m "test: AI 自动生成单元测试用例" || echo "无新测试文件"
          git push
